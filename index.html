<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aplikasi Catat Piutang</title>
    <link rel="icon" type="image/png" href="https://iili.io/Ca7rF19.md.png">
    <style>
        /* Menggunakan dvh (Dynamic Viewport Height) untuk mengantisipasi address bar browser mobile */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            height: 100dvh; 
            overflow: hidden;
            background-color: #ffffff;
        }
        
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
            /* Memastikan scrolling di dalam iframe berjalan mulus di perangkat iOS */
            -webkit-overflow-scrolling: touch; 
        }
    </style>
</head>
<body>
    <iframe src="https://script.google.com/a/~/macros/s/AKfycbyQHVEHEm7u8MEwWD8jYvufoU-es8r1K8UnU7LhM4wjUt6wlgyZVobLAlcMAbBEVvteew/exec"></iframe>
</body>
</html>
